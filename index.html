<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget JAF - Mickaël</title>
    <style>
        :root { --bg: #f0f2f5; --card: #ffffff; --text: #1a202c; --accent: #f6e05e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; background: var(--card); padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 1.4em; margin-bottom: 5px; outline: none; }
        .info { text-align: center; font-size: 0.75em; color: #48bb78; margin-bottom: 20px; font-weight: bold; }

        .section { margin-bottom: 15px; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; position: relative; }
        .header { display: flex; flex-direction: column; margin-bottom: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-stats { font-size: 0.75em; font-weight: bold; color: #4a5568; margin-top: 4px; opacity: 0.8; }
        
        h4 { margin: 0; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; outline: none; }

        /* Couleurs */
        .cat-0 { border-left: 8px solid #48bb78; background: #f0fff4; }
        .cat-1 { border-left: 8px solid #4299e1; background: #ebf8ff; }
        .cat-2 { border-left: 8px solid #f56565; background: #fff5f5; }
        .cat-3 { border-left: 8px solid #805ad5; background: #faf5ff; }

        .row { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
        .label { flex: 1; font-size: 0.9em; outline: none; }
        input { width: 90px; padding: 6px; border: 1px solid #cbd5e0; border-radius: 5px; text-align: right; font-weight: bold; }

        .add-row { background: #2d3748; color: white; border: none; border-radius: 4px; padding: 4px 10px; cursor: pointer; }
        .del { background: none; border: none; color: #cbd5e0; cursor: pointer; font-size: 1.2em; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-main { flex: 2; padding: 12px; background: #2d3748; color: white; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
        .btn-sec { flex: 1; background: #edf2f7; border-radius: 8px; border: none; cursor: pointer; font-size: 0.8em; }

        .result-card { background: #1a202c; color: white; padding: 20px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .big-total { font-size: 2.5em; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h1 contenteditable="true" id="app-title">📊 Budget Mensuel Mickaël</h1>
    <div class="info">✓ Sauvegarde automatique locale</div>

    <div id="main-container"></div>

    <div class="btn-group">
        <button class="btn-main" onclick="addSection()">➕ AJOUTER CATÉGORIE</button>
        <button class="btn-sec" onclick="resetApp()">🗑️ RESET</button>
    </div>

    <div class="result-card">
        <div style="font-size: 0.9em; opacity: 0.8; margin-bottom: 5px;">RESTE À VIVRE RÉEL</div>
        <div id="total" class="big-total">0.00 €</div>
    </div>
</div>

<script>
    window.onload = () => {
        const saved = localStorage.getItem('budget_jaf_v2');
        if (saved) {
            document.getElementById('main-container').innerHTML = saved;
            rebind();
        } else {
            addSection("📥 REVENUS", "rev");
            addSection("🏠 MAISON & CHARGES", "exp");
        }
        calc();
    };

    function calc() {
        let totalRev = 0;
        let totalExp = 0;

        // Calculer le revenu total d'abord pour les pourcentages
        document.querySelectorAll('.val-rev').forEach(i => totalRev += parseFloat(i.value) || 0);

        // Parcourir chaque section pour calculer son total interne
        document.querySelectorAll('.section').forEach(sec => {
            let secTotal = 0;
            const type = sec.classList.contains('rev-sec') ? '.val-rev' : '.val-exp';
            
            sec.querySelectorAll(type).forEach(input => {
                secTotal += parseFloat(input.value) || 0;
            });

            if (type === '.val-exp') totalExp += secTotal;

            // Mise à jour de l'affichage du total de section et %
            const stats = sec.querySelector('.header-stats');
            const percent = totalRev > 0 ? ((secTotal / totalRev) * 100).toFixed(1) : 0;
            stats.innerText = `Sous-total : ${secTotal.toFixed(2)} € | ${percent}% du budget`;
        });

        document.getElementById('total').innerText = (totalRev - totalExp).toLocaleString('fr-FR', { style: 'currency', currency: 'EUR' });
        localStorage.setItem('budget_jaf_v2', document.getElementById('main-container').innerHTML);
    }

    function addSection(name = "NOUVELLE CATÉGORIE", mode = "exp") {
        const id = 's-' + Date.now();
        const colorClass = 'cat-' + (document.querySelectorAll('.section').length % 4);
        const secTypeClass = mode === "rev" ? "rev-sec" : "exp-sec";
        const div = document.createElement('div');
        div.className = `section ${colorClass} ${secTypeClass}`;
        div.id = id;
        div.innerHTML = `
            <div class="header">
                <div class="header-top">
                    <h4 contenteditable="true" oninput="calc()">${name}</h4>
                    <button class="add-row" onclick="addRow('${id}', '${mode}')">+</button>
                </div>
                <div class="header-stats">Sous-total : 0.00 € | 0%</div>
            </div>
            <div class="rows">
                <div class="row">
                    <span contenteditable="true" class="label" oninput="calc()">Description</span>
                    <input type="number" class="val-${mode}" value="0" oninput="calc()">
                    <button class="del" onclick="this.parentElement.remove(); calc();">×</button>
                </div>
            </div>`;
        document.getElementById('main-container').appendChild(div);
        calc();
    }

    function addRow(sid, mode) {
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<span contenteditable="true" class="label" oninput="calc()">Détail</span>
                         <input type="number" class="val-${mode}" value="0" oninput="calc()">
                         <button class="del" onclick="this.parentElement.remove(); calc();">×</button>`;
        document.getElementById(sid).querySelector('.rows').appendChild(row);
        calc();
    }

    function rebind() {
        document.querySelectorAll('input').forEach(i => i.oninput = calc);
        document.querySelectorAll('[contenteditable]').forEach(e => e.oninput = calc);
    }

    function resetApp() { if(confirm("Effacer tout ?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
